services:
  - type: web
    name: karada-map-backend
    runtime: node
    plan: free
    rootDir: firefix_mobile/map_backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: ORS_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
